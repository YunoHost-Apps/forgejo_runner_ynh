#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/tests.v1.schema.json

test_format = 1.0

[default]

    # ------------
    # Tests to run
    # ------------

    preinstall = """
    sudo yunohost tools update apps
    sudo yunohost app install forgejo --force --args "domain=domain.tld&path=/&init_main_permission=visitors&init_admin_permission=admins"
    sudo yunohost app config set forgejo main.actions.actions_enabled -v true
    """

    # -------------------------------
    # Default args to use for install
    # -------------------------------

    args.forge_url = "https://domain.tld/"
    args.registration_token = "7c31591e8b67225a116d4a4519ea8e507e08f71f"
    args.runner_name = "ynh_local_runner"
    args.runner_labels = "self-hosted:host"
    args.local_forge = "0"

    # -------------------------------
    # Commits to test upgrade from
    # -------------------------------
